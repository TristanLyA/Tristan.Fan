// ── 节点配置远程地址（与插件保持一致）──
const CONFIG_URLS = [
  'https://gitlab.com/zhifan999/fq/-/raw/main/config.json',
  'https://www.githubip.xyz/config.json',
];

// ── 国旗 flag 映射 ──
const FLAG_MAP = {
  US: '🇺🇸', HK: '🇭🇰', JP: '🇯🇵', KR: '🇰🇷',
  TW: '🇹🇼', SG: '🇸🇬', DE: '🇩🇪', FR: '🇫🇷',
  GB: '🇬🇧', AU: '🇦🇺', CA: '🇨🇦', NL: '🇳🇱',
};

// ─────────────────────────────────────────────────────────────
// 工具函数
// ─────────────────────────────────────────────────────────────
function pemToBuffer(pem) {
  const b64 = pem.replace(/-----[^-]+-----/g, '').replace(/\s/g, '');
  return Buffer.from(b64, 'base64');
}

function b64ToBuffer(b64) {
  return Buffer.from(b64, 'base64');
}

// ─────────────────────────────────────────────────────────────
// 拉取 + 解密远程配置
// ─────────────────────────────────────────────────────────────
async function fetchAndDecrypt() {
  let envelope = null;

  for (const url of CONFIG_URLS) {
    try {
      console.log(`⏳ 正在从 ${url} 拉取配置…`);
      const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
      if (res.ok) {
        envelope = await res.json();
        console.log(`✅ 拉取成功`);
        break;
      }
    } catch (e) {
      console.warn(`⚠️  ${url} 失败: ${e.message}`);
    }
  }

  if (!envelope) throw new Error('❌ 所有配置源均失败');

  // 导入 RSA 私钥
  const privateKey = await crypto.subtle.importKey(
    'pkcs8',
    pemToBuffer(PRIVATE_KEY_PEM),
    { name: 'RSA-OAEP', hash: 'SHA-1' },
    false,
    ['decrypt']
  );

  // RSA 解密 AES 密钥
  const aesKeyBuf = await crypto.subtle.decrypt(
    { name: 'RSA-OAEP' },
    privateKey,
    b64ToBuffer(envelope.key)
  );

  // 导入 AES 密钥
  const aesKey = await crypto.subtle.importKey(
    'raw', aesKeyBuf, { name: 'AES-CBC' }, false, ['decrypt']
  );

  // AES 解密数据
  const decrypted = await crypto.subtle.decrypt(
    { name: 'AES-CBC', iv: b64ToBuffer(envelope.iv) },
    aesKey,
    b64ToBuffer(envelope.data)
  );

  return JSON.parse(new TextDecoder().decode(decrypted));
}

// ─────────────────────────────────────────────────────────────
// 生成 Clash YAML
// ─────────────────────────────────────────────────────────────
function generateClashYAML(config) {
  const { nodes, version, updated } = config;
  const now = new Date().toISOString().replace('T', ' ').slice(0, 19);

  // 代理列表
  const proxyLines = nodes.map(n => {
    const emoji = FLAG_MAP[n.flag] || '🌐';
    return [
      `  - name: "${emoji} ${n.name}"`,
      `    type: http`,
      `    server: ${n.server}`,
      `    port: ${n.port}`,
      `    tls: true`,
    ].join('\n');
  }).join('\n\n');

  // 所有节点名称列表（用于 proxy-groups）
  const nameList = nodes.map(n => {
    const emoji = FLAG_MAP[n.flag] || '🌐';
    return `      - "${emoji} ${n.name}"`;
  }).join('\n');

  return `# FanVPN 自动订阅 | 节点数: ${nodes.length}
# 配置版本: v${version} | 远程更新时间: ${updated}
# 本地同步时间: ${now} UTC
# 订阅源: github.com/TristanLyA/Tristan.Fan
# ⚠️ 此文件由 GitHub Actions 自动生成，请勿手动编辑

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

proxies:
${proxyLines}

proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies:
      - "♻️ 自动选择"
      - "🎯 直连"
${nameList}

  - name: "♻️ 自动选择"
    type: url-test
    proxies:
${nameList}
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: "🎯 直连"
    type: select
    proxies:
      - DIRECT

rules:
  - DOMAIN-SUFFIX,cn,DIRECT
  - DOMAIN-SUFFIX,baidu.com,DIRECT
  - DOMAIN-SUFFIX,qq.com,DIRECT
  - DOMAIN-SUFFIX,weixin.qq.com,DIRECT
  - DOMAIN-SUFFIX,taobao.com,DIRECT
  - DOMAIN-SUFFIX,tmall.com,DIRECT
  - DOMAIN-SUFFIX,jd.com,DIRECT
  - DOMAIN-SUFFIX,alipay.com,DIRECT
  - DOMAIN-SUFFIX,aliyun.com,DIRECT
  - DOMAIN-SUFFIX,tencent.com,DIRECT
  - DOMAIN-SUFFIX,163.com,DIRECT
  - DOMAIN-SUFFIX,126.com,DIRECT
  - DOMAIN-SUFFIX,weibo.com,DIRECT
  - DOMAIN-SUFFIX,bilibili.com,DIRECT
  - DOMAIN-SUFFIX,iqiyi.com,DIRECT
  - DOMAIN-SUFFIX,youku.com,DIRECT
  - DOMAIN-SUFFIX,zhihu.com,DIRECT
  - DOMAIN-SUFFIX,douyin.com,DIRECT
  - DOMAIN-SUFFIX,xiaohongshu.com,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,🚀 节点选择
`;
}

// ─────────────────────────────────────────────────────────────
// 主流程
// ─────────────────────────────────────────────────────────────
async function main() {
  try {
    const config = await fetchAndDecrypt();
    console.log(`📦 解密成功，版本 v${config.version}，共 ${config.nodes.length} 个节点`);

    const yaml = generateClashYAML(config);
    writeFileSync(OUTPUT_FILE, yaml, 'utf-8');
    console.log(`💾 已写入: ${OUTPUT_FILE}`);
    console.log(`🎉 订阅文件更新完成！`);

    // 打印节点列表
    config.nodes.forEach((n, i) => {
      const emoji = FLAG_MAP[n.flag] || '🌐';
      console.log(`   ${String(i + 1).padStart(2)}. ${emoji} ${n.name} → ${n.server}:${n.port}`);
    });

  } catch (e) {
    console.error(`❌ 更新失败: ${e.message}`);
    process.exit(1);
  }
}

main();


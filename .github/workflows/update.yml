name: 🔄 自动更新

on:
  # 每 6 小时自动运行一次
  schedule:
    - cron: '0 */6 * * *'
  # 支持在 GitHub 网页上手动触发
  workflow_dispatch:
    inputs:
      force:
        description: '强制更新'
        required: false
        default: 'false'

jobs:
  update-subscription:
    name: 拉取解密节点 & 更新订阅
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许 push 到仓库

    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 🔓 执行解密 & 生成订阅文件
        run: node scripts/update.js

      - name: 🚀 提交并推送更新
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Fan
          git commit --allow-empty -m "🔄 自动同步 $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
